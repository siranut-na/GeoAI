// ---- Google Maps basemaps (via Google tile servers) ----
const gSubs = ['mt0','mt1','mt2','mt3'];
function gLayer(lyrs){
  return L.tileLayer('https://{s}.google.com/vt/lyrs='+lyrs+'&x={x}&y={y}&z={z}',
    {subdomains:gSubs, maxZoom:20, attribution:'&copy; Google'});
}
const roadmap  = gLayer('m');
const satellite= gLayer('s');
const hybrid   = gLayer('y');
const terrain  = gLayer('p');

const map = L.map('map', {center:[13.03893, 101.49017], zoom:6, layers:[hybrid]});

L.control.layers(
  {'Google ไฮบริด (Hybrid)':hybrid,'Google ดาวเทียม (Satellite)':satellite,
   'Google ถนน (Roadmap)':roadmap,'Google ภูมิประเทศ (Terrain)':terrain},
  {}, {collapsed:false}
).addTo(map);
L.control.scale({imperial:false}).addTo(map);

// ---- Thailand overlay ----
const layer = L.geoJSON(geojson, {
  style:{color:'#ff3b30', weight:2, fillColor:'#ff3b30', fillOpacity:0.12},
  onEachFeature:(f,l)=>{
    const p=f.properties||{};
    const rows=Object.entries(p).map(([k,v])=>`<b>${k}</b>: ${v}`).join('<br>');
    l.bindPopup(rows||'Thailand');
    l.on('mouseover',()=>l.setStyle({fillOpacity:0.28,weight:3}));
    l.on('mouseout',()=>layer.resetStyle(l));
  }
}).addTo(map);
map.fitBounds(layer.getBounds(), {padding:[20,20]});

map.on('mousemove', e=>{
  document.getElementById('coord').textContent =
    e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5);
});
</script>
